# Streamlit Community Cloud production configuration.

[server]
headless = true
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#59b3ff"
backgroundColor = "#0d1117"
secondaryBackgroundColor = "#161b22"
textColor = "#f5f7fb"
font = "sans serif"
